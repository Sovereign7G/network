# monitoring/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'cloudflare-edge'
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets: ['api.sovereign-mesh.io']
    scheme: https
  
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
  
  - job_name: 'redis'
    static_configs:
      - targets: ['redis.sovereign-mesh.io:6379']
  
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres.sovereign-mesh.io:9187']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alerts.yml'
