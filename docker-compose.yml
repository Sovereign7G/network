version: '3.8'

# ====== NETWORK ======
networks:
  sovereign-ai-mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ====== VOLUMES ======
volumes:
  s7g-ledger-1:
  s7g-ledger-2:
  s7g-ledger-3:
  s7g-ledger-4:
  model-cache:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

# ====== SERVICES ======
services:
  # ===== 1. S7G COMMITTEE NODES (4-Node BFT Cluster) =====
  s7g-node-1:
    build:
      context: ./s7g-committee
      dockerfile: Dockerfile
    container_name: s7g-node-1
    hostname: s7g-node-1
    networks:
      sovereign-ai-mesh:
        ipv4_address: 172.20.0.10
    environment:
      - NODE_ID=1
      - NODE_ROLE=leader
      - COMMITTEE_SIZE=4
      - PEERS=s7g-node-2:26656,s7g-node-3:26656,s7g-node-4:26656
      - GENESIS_FILE=/app/genesis.json
      - LEDGER_PATH=/app/ledger
    ports:
      - "1317:1317"    # API
      - "26656:26656"  # P2P
      - "26657:26657"  # RPC
    volumes:
      - ./s7g-committee/genesis/genesis.json:/app/genesis.json:ro
      - s7g-ledger-1:/app/ledger
    restart: unless-stopped

  s7g-node-2:
    build:
      context: ./s7g-committee
      dockerfile: Dockerfile
    container_name: s7g-node-2
    hostname: s7g-node-2
    networks:
      sovereign-ai-mesh:
        ipv4_address: 172.20.0.11
    environment:
      - NODE_ID=2
      - NODE_ROLE=follower
      - COMMITTEE_SIZE=4
      - PEERS=s7g-node-1:26656,s7g-node-3:26656,s7g-node-4:26656
      - GENESIS_FILE=/app/genesis.json
      - LEDGER_PATH=/app/ledger
    ports:
      - "1318:1317"
      - "26658:26656"
      - "26659:26657"
    volumes:
      - ./s7g-committee/genesis/genesis.json:/app/genesis.json:ro
      - s7g-ledger-2:/app/ledger
    restart: unless-stopped

  s7g-node-3:
    build:
      context: ./s7g-committee
      dockerfile: Dockerfile
    container_name: s7g-node-3
    hostname: s7g-node-3
    networks:
      sovereign-ai-mesh:
        ipv4_address: 172.20.0.12
    environment:
      - NODE_ID=3
      - NODE_ROLE=follower
      - COMMITTEE_SIZE=4
      - PEERS=s7g-node-1:26656,s7g-node-2:26656,s7g-node-4:26656
      - GENESIS_FILE=/app/genesis.json
      - LEDGER_PATH=/app/ledger
    ports:
      - "1319:1317"
      - "26660:26656"
      - "26661:26657"
    volumes:
      - ./s7g-committee/genesis/genesis.json:/app/genesis.json:ro
      - s7g-ledger-3:/app/ledger
    restart: unless-stopped

  s7g-node-4:
    build:
      context: ./s7g-committee
      dockerfile: Dockerfile
    container_name: s7g-node-4
    hostname: s7g-node-4
    networks:
      sovereign-ai-mesh:
        ipv4_address: 172.20.0.13
    environment:
      - NODE_ID=4
      - NODE_ROLE=follower
      - COMMITTEE_SIZE=4
      - PEERS=s7g-node-1:26656,s7g-node-2:26656,s7g-node-3:26656
      - GENESIS_FILE=/app/genesis.json
      - LEDGER_PATH=/app/ledger
    ports:
      - "1320:1317"
      - "26662:26656"
      - "26663:26657"
    volumes:
      - ./s7g-committee/genesis/genesis.json:/app/genesis.json:ro
      - s7g-ledger-4:/app/ledger
    restart: unless-stopped

  # ===== 2. INFERENCE ENGINE (vLLM with GPU) =====
  inference:
    image: vllm/vllm-openai:latest
    container_name: inference
    hostname: inference
    networks:
      sovereign-ai-mesh:
        ipv4_address: 172.20.0.20
    environment:
      - MODEL_NAME=meta-llama/Llama-3.1-8B-Instruct
      - MAX_MODEL_LEN=8192
      - GPU_MEMORY_UTILIZATION=0.90
      - TENSOR_PARALLEL_SIZE=1
      - HF_HOME=/root/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - model-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ===== 3. GATEWAY (LiteLLM + S7G Middleware) =====
  gateway:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: gateway
    hostname: gateway
    networks:
      sovereign-ai-mesh:
        ipv4_address: 172.20.0.30
    environment:
      - DATABASE_URL=postgresql://ai_user:${DB_PASSWORD:-changeme}@db:5432/litellm
      - REDIS_URL=redis://redis:6379
      - MASTER_KEY=${MASTER_API_KEY:-sk-default-key}
      - S7G_API_URL=http://s7g-node-1:1317
      - S7G_COMMITTEE=http://s7g-node-1:1317,http://s7g-node-2:1317,http://s7g-node-3:1317,http://s7g-node-4:1317
    ports:
      - "4000:4000"
    depends_on:
      - redis
      - db
      - inference
      - s7g-node-1
    restart: unless-stopped

  # ===== 4. REDIS =====
  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    networks:
      sovereign-ai-mesh:
        ipv4_address: 172.20.0.40
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ===== 5. POSTGRES =====
  db:
    image: postgres:15-alpine
    container_name: postgres
    hostname: db
    networks:
      sovereign-ai-mesh:
        ipv4_address: 172.20.0.50
    environment:
      - POSTGRES_USER=ai_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - POSTGRES_DB=litellm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  # ===== 6. PROMETHEUS =====
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    hostname: prometheus
    networks:
      sovereign-ai-mesh:
        ipv4_address: 172.20.0.60
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    restart: unless-stopped

  # ===== 7. GRAFANA =====
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    hostname: grafana
    networks:
      sovereign-ai-mesh:
        ipv4_address: 172.20.0.70
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # ===== 8. S7G CLI =====
  s7g-cli:
    build:
      context: ./s7g-committee
      dockerfile: Dockerfile.cli
    container_name: s7g-cli
    hostname: s7g-cli
    networks:
      sovereign-ai-mesh:
        ipv4_address: 172.20.0.90
    command: tail -f /dev/null
    depends_on:
      - s7g-node-1
      - s7g-node-2
      - s7g-node-3
      - s7g-node-4
    profiles:
      - cli
