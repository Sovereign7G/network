name: Hermes Agent CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      agent:
        description: 'Specific agent to run'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - hermes_security_auditor
          - hermes_cost_optimizer
          - hermes_capacity_planner
          - hermes_deployment_architect
          - hermes_stress_tester
          - hermes_observability_expert
          - hermes_sre_runbook_manager

jobs:
  security-audit:
    runs-on: ubuntu-latest
    if: github.event.inputs.agent == 'all' || github.event.inputs.agent == 'hermes_security_auditor' || github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-python: '3.10'
          
      - name: Run Container Security Verification
        run: |
          echo "Simulating container security scan..."
          python3 -c "
          from agents.hermes_agents import HermesSecurityAuditor
          auditor = HermesSecurityAuditor()
          res = auditor.run_full_audit('sovereign-mesh:latest', '06_INFRA/siphon_router/', 'secrets/')
          print(res)
          "

  cost-optimization:
    runs-on: ubuntu-latest
    if: github.event.inputs.agent == 'all' || github.event.inputs.agent == 'hermes_cost_optimizer' || github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-python: '3.10'
          
      - name: Analyze Cloud Costs
        run: |
          echo "Simulating cloud cost analysis..."
          python3 -c "
          from agents.hermes_agents import HermesCostOptimizer
          optimizer = HermesCostOptimizer()
          res = optimizer.run_full_optimization()
          print(res)
          "

  capacity-planning:
    runs-on: ubuntu-latest
    if: github.event.inputs.agent == 'all' || github.event.inputs.agent == 'hermes_capacity_planner' || github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-python: '3.10'
          
      - name: Forecast Capacity
        run: |
          echo "Simulating capacity analysis..."
          python3 -c "
          from agents.hermes_agents import HermesCapacityPlanner
          planner = HermesCapacityPlanner()
          res = planner.run_full_capacity_plan()
          print(res)
          "

  production-workflow:
    runs-on: ubuntu-latest
    needs: [security-audit, cost-optimization, capacity-planning]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-python: '3.10'
          
      - name: Run Full Production Operations
        run: |
          python3 scripts/demo_production_operations.py
