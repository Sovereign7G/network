name: S7G Intelligence Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

jobs:
  validate-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install networkx pyvis requests

      - name: Run Triage Gate
        run: |
          # Verify current security graph state
          # graph_triage.py is tracked in repo scripts/ — committed alongside this workflow
          python3 scripts/graph_triage.py \
            --sarif .beads/memory/combined.sarif \
            --fail-on-central 10.0

      - name: Verify Skill Sediment Index
        run: |
          # Scan repo's documentation for vagueness and duplication
          # Default path is current directory (the repo itself)
          python3 scripts/scan_skills.py --threshold 0.10

      - name: Notify Slack on Failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{"text": "❌ S7G Pipeline Failed: Centrality threshold policy violated!"}'

  deploy-registry:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: validate-graph
    steps:
      - name: Mock deploy registry
        run: |
          echo "deploying to prod registry node..."
