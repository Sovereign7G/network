name: Build Mobile Stubs

on:
  push:
    paths:
      - 'mobile/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        default: '1.0.0'

jobs:
  build-android:
    name: Build Android Stub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build Android Stub
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-stub
          path: mobile/android/app/build/outputs/apk/release/app-release.apk

  build-ios:
    name: Build iOS Stub
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'
      - name: Build iOS Stub
        run: |
          cd mobile/ios
          xcodebuild -scheme S7GWallet -configuration Release \
            archive -archivePath build/S7GWallet.xcarchive
      - name: Export IPA
        run: |
          cd mobile/ios
          xcodebuild -exportArchive \
            -archivePath build/S7GWallet.xcarchive \
            -exportPath build/S7GWallet.ipa \
            -exportOptionsPlist ExportOptions.plist
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-stub
          path: mobile/ios/build/S7GWallet.ipa
