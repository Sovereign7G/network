# .github/workflows/sovereignty.yml
name: 🏛️ AGE REPUBLIC SOVEREIGNTY AUDIT

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  audit:
    name: Sovereignty Audit (Era 107)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests flask cryptography

      - name: Run Sovereignty Audit
        id: audit
        run: |
          # Run the audit engine natively
          python3 -c "from node4.rd_audit import run_sovereignty_audit; import json; r = run_sovereignty_audit(); print(f'SCORE={r.get(\"score\", 0)}'); print(f'FINDINGS={r.get(\"total_findings\", 0)}'); exit(0 if r.get(\"score\", 0) >= 0.8 else 1)"
        
      - name: Generate Sovereignty Certificate
        if: always()
        run: |
          python3 -c "from node4.certificate_generator import SovereigntyCertificate; cert = SovereigntyCertificate(); print(cert.generate_toon())" > sovereignty_report.toon

      - name: Upload TOON Certificate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sovereignty-certificate
          path: sovereignty_report.toon

      - name: Enforcement Gate
        run: |
          echo "Sovereignty Audit Complete."
          # Logic to fail if score is too low is handled in the 'Run Sovereignty Audit' step
