name: S7G Vulnerability Graph Triage

on:
  pull_request:
    paths:
      - '**/*.py'
      - '**/*.rs'

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install networkx pyvis

      - name: Run Triage Centrality Check
        run: |
          # Assert that no file node exceeds centrality safety limit of 8.0
          # graph_triage.py is tracked in repo scripts/ — committed alongside this workflow
          python3 scripts/graph_triage.py \
            --sarif .beads/memory/combined.sarif \
            --fail-on-central 8.0
