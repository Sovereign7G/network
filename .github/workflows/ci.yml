# .github/workflows/ci.yml
name: Sovereign 7G CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FOUNDRY_PROFILE: ci

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install ruff mypy types-requests types-python-dateutil

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy .

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Forge fmt check
        run: forge fmt --check

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Cargo fmt check
        run: cd src/move_vm_canister && cargo fmt --check

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Forge build
        run: forge build

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Cargo build
        run: cd src/move_vm_canister && cargo build --release

      - name: Setup Mojo
        uses: modular/mojo-actions@v1

      - name: Mojo build
        run: mojo build beam_controller.mojo

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            out/
            target/release/
            sdk/py/dist/
            sdk/js/dist/

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r requirements.txt
        env:
          WEB3_RPC_URL: ${{ secrets.BASE_RPC_URL }}

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run on-chain tests
        run: python3 test_onchain.py
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}

      - name: Run stress tests
        run: python3 tests/stress/test_stress.py --iterations 100

      - name: Run chaos tests
        run: python3 tests/chaos/test_chaos.py --suite all

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: Bandit SAST
        run: bandit -r . -f json -o reports/bandit.json

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Slither SAST
        run: pip install slither-analyzer && slither . --json reports/slither.json

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/*.json

  deploy-icp:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup DFX
        uses: dfinity/setup-dfx@v1

      - name: Deploy to ICP
        run: dfx deploy --network ic
        env:
          DFX_IDENTITY_PEM: ${{ secrets.DFX_IDENTITY_PEM }}

  push-docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push sip-proxy
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.sip
          push: true
          tags: 7g/sip-proxy:latest,7g/sip-proxy:${{ github.sha }}

      - name: Build and push beam-controller
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.beam
          push: true
          tags: 7g/beam-controller:latest,7g/beam-controller:${{ github.sha }}

  deploy-base:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Deploy to Base Mainnet
        run: forge script scripts/DeploySovereignSuite.s.sol --rpc-url $BASE_RPC_URL --broadcast
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
