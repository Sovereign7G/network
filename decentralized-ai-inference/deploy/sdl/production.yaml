version: "2.0"

services:
  s7g-node-1:
    image: sovereign7g/s7g-committee:latest
    expose:
      - port: 1317
        as: 1317
        to:
          - global: false
      - port: 26656
        as: 26656
        to:
          - global: false
    env:
      - NODE_ID=1
      - NODE_ROLE=leader
      - COMMITTEE_SIZE=4
      - PEERS=s7g-node-2:26656,s7g-node-3:26656,s7g-node-4:26656
      - API_HOST=0.0.0.0
      - API_PORT=1317
      - LEDGER_PATH=/app/ledger
    params:
      storage:
        data:
          mount: /app/ledger

  s7g-node-2:
    image: sovereign7g/s7g-committee:latest
    expose:
      - port: 1317
        as: 1317
        to:
          - global: false
      - port: 26656
        as: 26656
        to:
          - global: false
    env:
      - NODE_ID=2
      - NODE_ROLE=follower
      - COMMITTEE_SIZE=4
      - PEERS=s7g-node-1:26656,s7g-node-3:26656,s7g-node-4:26656
      - API_HOST=0.0.0.0
      - API_PORT=1317
      - LEDGER_PATH=/app/ledger
    params:
      storage:
        data:
          mount: /app/ledger

  s7g-node-3:
    image: sovereign7g/s7g-committee:latest
    expose:
      - port: 1317
        as: 1317
        to:
          - global: false
      - port: 26656
        as: 26656
        to:
          - global: false
    env:
      - NODE_ID=3
      - NODE_ROLE=follower
      - COMMITTEE_SIZE=4
      - PEERS=s7g-node-1:26656,s7g-node-2:26656,s7g-node-4:26656
      - API_HOST=0.0.0.0
      - API_PORT=1317
      - LEDGER_PATH=/app/ledger
    params:
      storage:
        data:
          mount: /app/ledger

  s7g-node-4:
    image: sovereign7g/s7g-committee:latest
    expose:
      - port: 1317
        as: 1317
        to:
          - global: false
      - port: 26656
        as: 26656
        to:
          - global: false
    env:
      - NODE_ID=4
      - NODE_ROLE=follower
      - COMMITTEE_SIZE=4
      - PEERS=s7g-node-1:26656,s7g-node-2:26656,s7g-node-3:26656
      - API_HOST=0.0.0.0
      - API_PORT=1317
      - LEDGER_PATH=/app/ledger
    params:
      storage:
        data:
          mount: /app/ledger

  gateway:
    image: ghcr.io/sovereign7g/litellm-gateway:latest
    expose:
      - port: 4000
        as: 4000
        accept:
          - gateway.sovereign7g.network
        to:
          - global: true
    env:
      - S7G_NODE_URL=http://s7g-node-1:1317

profiles:
  compute:
    s7g-node:
      resources:
        cpu:
          units: 2.0
        memory:
          size: 4Gi
        storage:
          - size: 10Gi
          - name: data
            size: 20Gi
            attributes:
              persistent: true
    gateway:
      resources:
        cpu:
          units: 4.0
        memory:
          size: 8Gi
        storage:
          size: 10Gi

  placement:
    akash:
      pricing:
        s7g-node:
          denom: uakt
          amount: 100
        gateway:
          denom: uakt
          amount: 100

deployment:
  s7g-node-1:
    akash:
      profile: s7g-node
      count: 1
  s7g-node-2:
    akash:
      profile: s7g-node
      count: 1
  s7g-node-3:
    akash:
      profile: s7g-node
      count: 1
  s7g-node-4:
    akash:
      profile: s7g-node
      count: 1
  gateway:
    akash:
      profile: gateway
      count: 1
