model_list:
  # Primary: S7G BFT Committee (consensus layer)
  - model_name: s7g-committee
    litellm_params:
      model: openai/s7g-committee
      api_base: https://s7g-committee.onrender.com
      api_key: dummy
    model_info:
      mode: completion

  # Fallback: Bittensor SN1 (via adapter)
  - model_name: bittensor-sn1
    litellm_params:
      model: openai/bittensor-sn1
      api_base: https://bittensor-adapter.onrender.com/v1
      api_key: dummy
    model_info:
      mode: completion

  # ICP LLM Canister — Llama 3.1 8B
  - model_name: icp-llama
    litellm_params:
      model: openai/icp-llama
      api_base: https://llm-canister.icp0.io/v1/chat/completions
      api_key: dummy
    model_info:
      mode: completion

  # ICP LLM Canister — Qwen 3 32B
  - model_name: icp-qwen
    litellm_params:
      model: openai/icp-qwen
      api_base: https://llm-canister.icp0.io/v1/chat/completions
      api_key: dummy
    model_info:
      mode: completion
      max_tokens: 4096

  # Render Network GPU (OpenAI-compatible)
  - model_name: render-gpu
    litellm_params:
      model: openai/render-gpu
      api_base: https://api.render.com/v1/completions
      api_key: os.environ/RENDER_API_KEY
    model_info:
      mode: completion

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: os.environ/MASTER_API_KEY

router_settings:
  routing_strategy: "usage-based-routing"
  enable_loadbalancing: true
  num_retries: 2
  timeout: 30
  fallbacks:
    - s7g-committee:
        - icp-llama
        - icp-qwen
        - render-gpu
        - bittensor-sn1
