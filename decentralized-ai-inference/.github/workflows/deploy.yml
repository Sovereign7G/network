name: Deploy to Akash

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Akash Provider
        run: |
          chmod +x deploy/scripts/deploy.sh
          ./deploy/scripts/deploy.sh
