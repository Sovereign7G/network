name: Build Mobile Stubs

on:
  push:
    paths:
      - 'templates/mobile-android-stub/**'
      - 'templates/mobile-ios-stub/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        default: '1.0.0'

jobs:
  build-android:
    name: Build Android Stub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Build Android Stub
        run: |
          cd templates/mobile-android-stub
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-stub
          path: templates/mobile-android-stub/app/build/outputs/apk/release/app-release.apk
      - name: Upload to Play Store (Internal)
        if: github.ref == 'refs/heads/main'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: \${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.s7g.wallet
          releaseFiles: templates/mobile-android-stub/app/build/outputs/apk/release/app-release.apk
          track: internal

  build-ios:
    name: Build iOS Stub
    runs-on: macos-latest
    needs: build-android
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'
      - name: Build iOS Stub
        run: |
          cd templates/mobile-ios-stub
          xcodebuild -scheme S7GWallet -configuration Release \
            -destination 'generic/platform=iOS' archive \
            -archivePath build/S7GWallet.xcarchive
      - name: Export IPA
        run: |
          cd templates/mobile-ios-stub
          xcodebuild -exportArchive \
            -archivePath build/S7GWallet.xcarchive \
            -exportPath build/S7GWallet.ipa \
            -exportOptionsPlist ExportOptions.plist
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-stub
          path: templates/mobile-ios-stub/build/S7GWallet.ipa
      - name: Upload to TestFlight
        if: github.ref == 'refs/heads/main'
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: templates/mobile-ios-stub/build/S7GWallet.ipa
          api-key-id: \${{ secrets.APP_STORE_API_KEY_ID }}
          api-private-key: \${{ secrets.APP_STORE_API_PRIVATE_KEY }}
          api-issuer-id: \${{ secrets.APP_STORE_API_ISSUER_ID }}
